<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin | Registros Globales</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --card-soft:#24304a;
    --text:#f8fafc;
    --muted:#94a3b8;
    --primary:#6366f1;
    --primary-dark:#4f46e5;
    --danger:#ef4444;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
    font-family:'Inter',sans-serif;
    background:radial-gradient(circle at top,#1e293b,#020617);
    color:var(--text);
    padding:40px 20px;
    min-height: 100vh;
}

.panel{
    max-width:1000px;
    margin:0 auto;
    background:linear-gradient(180deg,#1e293b,#0f172a);
    border-radius:28px;
    padding:36px;
    box-shadow:0 40px 80px rgba(0,0,0,.6);
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:35px;
    padding-bottom:20px;
    border-bottom:1px solid rgba(148,163,184,.15);
}

.header h1{
    font-size:2rem;
    font-weight:800;
    background: linear-gradient(to right, #818cf8, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.btn-back{
    padding: 10px 20px;
    background: var(--card-soft);
    color: var(--text);
    text-decoration: none;
    border-radius: 12px;
    font-weight: 600;
    transition: all 0.2s;
    border: 1px solid rgba(255,255,255,0.05);
}
.btn-back:hover{
    background: var(--primary);
    transform: translateY(-2px);
}

/* TABLA */
.table-responsive {
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th {
    text-align: left;
    color: var(--muted);
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 16px;
    border-bottom: 2px solid var(--card-soft);
}

td {
    padding: 16px;
    border-bottom: 1px solid rgba(148,163,184,.1);
    color: var(--text);
    font-size: 0.95rem;
}

tr:last-child td {
    border-bottom: none;
}

tr:hover td {
    background: rgba(255,255,255,0.02);
}

.user-email {
    font-weight: 600;
    color: #a5b4fc;
}

.empty-state {
    padding: 40px;
    text-align: center;
    color: var(--muted);
}
</style>
</head>
<body>

<div class="panel">

    <div class="header">
        <h1>☢️ Zona Admin</h1>
        <a href="/" class="btn-back">← Volver al Panel</a>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>Usuario</th>
                    <th>Peso Registrado</th>
                    <th>Fecha</th>
                </tr>
            </thead>
            <tbody>
                {% for r in registros %}
                <tr>
                    <td><span class="user-email">{{ r[1] }}</span></td>
                    <td><strong>{{ r[2] }}</strong> kg</td>
                    <td>{{ r[3] }}</td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="3">
                        <div class="empty-state">No hay registros en la base de datos.</div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
