name: Coverage

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          # Instalamos la librería 'coveralls' nativa de Python
          pip install pytest pytest-cov coveralls

      - name: Run tests and Upload
        env:
          # Es CRUCIAL pasar el token aquí para que coveralls sepa quién eres
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Generamos el reporte normal (.coverage) que la librería entiende mejor
          pytest --cov=src
          # Subimos directo con el comando python
          coveralls
